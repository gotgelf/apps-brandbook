name: Branch Name Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-branch:
    name: Validate Branch Name (Linear)
    runs-on: ubuntu-latest
    steps:
      - name: Check branch follows Linear naming
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch: ${BRANCH}"

          # Linear generates branches like:
          #   username/per-123-some-description
          #   per-123-some-description
          #
          # Pattern: optional username prefix, then project key + issue number
          # Adjust PER to your Linear project key(s)
          PATTERN="^([a-z0-9-]+/)?[a-z]+-[0-9]+-.+"

          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Branch name '${BRANCH}' does not match Linear format."
            echo ""
            echo "Expected format: [username/]<project-key>-<issue-number>-<description>"
            echo "Examples:"
            echo "  per-123-add-websocket-endpoint"
            echo "  alex/per-123-add-websocket-endpoint"
            echo ""
            echo "How to get the correct branch name:"
            echo "  1. Open your Linear issue"
            echo "  2. Click the branch icon (or ⌘+Shift+.) to copy the git branch name"
            echo "  3. Use: git checkout -b <copied-name>"
            exit 1
          fi

          # Extract issue ID for the PR body
          ISSUE_ID=$(echo "$BRANCH" | grep -oP '[a-z]+-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')
          echo "Linear issue: ${ISSUE_ID}"
          echo "issue_id=${ISSUE_ID}" >> "$GITHUB_OUTPUT"
