name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build lint image
        run: docker build --target lint -t app-lint -f Dockerfile .

      - name: Run linters
        run: docker run --rm app-lint

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build --target test -t app-test -f Dockerfile .

      - name: Run tests
        run: docker run --rm app-test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker build \
            --target production \
            -t app:${{ github.sha }} \
            -f Dockerfile .

      # Uncomment when you have a container registry configured:
      # - name: Login to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ${{ vars.REGISTRY_URL }}
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}
      #
      # - name: Push image
      #   run: |
      #     docker tag app:${{ github.sha }} ${{ vars.REGISTRY_URL }}/app:${{ github.sha }}
      #     docker tag app:${{ github.sha }} ${{ vars.REGISTRY_URL }}/app:latest
      #     docker push ${{ vars.REGISTRY_URL }}/app:${{ github.sha }}
      #     docker push ${{ vars.REGISTRY_URL }}/app:latest
