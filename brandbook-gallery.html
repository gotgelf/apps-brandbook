  #gallery { padding: 60px 24px; max-width: 1200px; margin: 0 auto; }
  #gallery h1 { font-size: 36px; font-weight: 800; text-align: center; letter-spacing: -1.5px; margin-bottom: 8px; color: #1A1A1E; }
  #gallery .subtitle { text-align: center; color: #6B7280; font-size: 15px; margin-bottom: 48px; }

  @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: 1fr; }
    #gallery { padding: 32px 16px; }
    #gallery h1 { font-size: 28px; }
    .detail-header { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
    .detail-name { font-size: 13px; order: 3; width: 100%; }
    .nav-btn { padding: 6px 10px; font-size: 11px; }
    .detail-body { padding: 24px 16px 60px; }
    .d-hero h1 { font-size: 28px !important; }
    .d-color-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .d-card-grid { grid-template-columns: 1fr; }
    .d-component-row { gap: 8px; }
    .d-btn { padding: 8px 14px; font-size: 13px; }
    .d-token-table { font-size: 11px; }
    .d-token-table td, .d-token-table th { padding: 6px 8px; }
  }

  .gallery-card {
    border-radius: 14px; overflow: hidden; cursor: pointer;
    border: 1px solid #E0DDD8; transition: all 0.25s; position: relative; background: #FFFFFF;
  }
  .gallery-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
  .gallery-card .preview { height: 160px; display: flex; position: relative; }
  .gallery-card .preview .half { flex: 1; display: flex; align-items: center; justify-content: center; }
  .gallery-card .preview .swatch { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
  .gallery-card .info { padding: 16px; background: #FFFFFF; }
  .gallery-card .info h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; color: #1A1A1E; }
  .gallery-card .info .desc { font-size: 13px; color: #6B7280; }
  .gallery-card .info .tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }

  .gallery-card .badge-trend { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.65); color: #FBBF24; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; backdrop-filter: blur(4px); letter-spacing: 0.5px; }

  .back-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; background: #FFFFFF; border: 1px solid #E0DDD8; color: #6B7280; flex-shrink: 0; }
  .back-btn:hover { background: #F0EDE8; color: #1A1A1E; }

  .nav-btn:hover { color: #1A1A1E; border-color: #9CA3AF; }
  .detail-name { font-weight: 700; font-size: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .detail-body { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  /* Shared detail styles */

  .d-section .d-desc { font-size: 14px; margin-bottom: 24px; }

  .d-color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .d-color-card { border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; }

  .d-btn { padding: 9px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .d-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }

// ========== MARKET TABLE BUILDER ==========
function buildMarketTable(o, borderCol, textMut, textCol, textSec, surfaceCol, successCol, dangerCol, isLight) {
  const hoverBg = isLight ? darken(surfaceCol,4) : lighten(surfaceCol,4);
  const rows = [
    ['1','BTC','PERP','$67,432.18','+2.41%','$1.82B','$18.4B','+0.0100%', true],
    ['2','ETH','PERP','$3,241.05','-1.08%','$890M','$8.2B','-0.0032%', false],
    ['3','SOL','PERP','$148.92','+5.33%','$340M','$2.1B','+0.0210%', true],
    ['4','XAU','TRADFI','$4,661.72','-0.24%','$115M','$242M','-0.0078%', false],
    ['5','AVAX','PERP','$8.81','+3.12%','$84M','$69M','+0.0150%', true],
    ['6','LINK','PERP','$8.54','-1.39%','$58M','$77M','-0.0032%', false],
    ['7','DOGE','PERP','$0.0842','+0.67%','$45M','$34M','+0.0045%', true],
  ];
  const mono = o.fonts.mono;
  const typeBg = function(t) { return t==='PERP' ? o.accent+'1A' : (isLight?'#F3F4F6':'#27272A'); };
  const typeColor = function(t) { return t==='PERP' ? o.accent : textSec; };
  return rows.map(function(r) {
    var chgCol = r[8] ? successCol : dangerCol;
    var arrow = r[8] ? '▲' : '▼';
    var fundCol = r[7].charAt(0)==='+' ? successCol : dangerCol;
    return '<tr style="border-bottom:1px solid '+borderCol+';transition:background 0.1s" onmouseenter="this.style.background=\''+hoverBg+'\'" onmouseleave="this.style.background=\'transparent\'">'
      +'<td style="padding:12px 14px;color:'+textMut+';font-family:\''+mono+'\',monospace">'+r[0]+'</td>'
      +'<td style="padding:12px 14px;font-weight:600;color:'+textCol+'">'+r[1]+'<span style="color:'+textMut+';font-weight:400;margin-left:4px;font-size:11px">USDT</span></td>'
      +'<td style="padding:12px 14px"><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:\''+mono+'\',monospace;background:'+typeBg(r[2])+';color:'+typeColor(r[2])+'">'+r[2]+'</span></td>'
      +'<td style="padding:12px 14px;text-align:right;font-family:\''+mono+'\',monospace;font-weight:500;color:'+textCol+'">'+r[3]+'</td>'
      +'<td style="padding:12px 14px;text-align:right;font-family:\''+mono+'\',monospace;font-weight:600;color:'+chgCol+'">'+arrow+' '+r[4]+'</td>'
      +'<td style="padding:12px 14px;text-align:right;font-family:\''+mono+'\',monospace;color:'+textCol+'">'+r[5]+'</td>'
      +'<td style="padding:12px 14px;text-align:right;font-family:\''+mono+'\',monospace;color:'+textCol+'">'+r[6]+'</td>'
      +'<td style="padding:12px 14px;text-align:right;font-family:\''+mono+'\',monospace;color:'+fundCol+'">'+r[7]+'</td>'
      +'</tr>';
  }).join('');
}

  document.getElementById('detail').style.display = 'none';
  document.body.style.background = '#F5F3EF';
  document.getElementById('detail').style.background = '';
  window.scrollTo(0, 0);
}

function navigateOption(delta) {
  let next = currentIndex + delta;
  if (next < 0) next = options.length - 1;
  if (next >= options.length) next = 0;
  showDetail(next);
}

function copyColor(hex) {
  navigator.clipboard.writeText(hex);
  const el = document.getElementById('copied');
  el.textContent = 'Copied ' + hex;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function lighten(hex, amt) {
  hex = hex.replace('#', '');
  let r = parseInt(hex.substring(0,2), 16);
  let g = parseInt(hex.substring(2,4), 16);
  let b = parseInt(hex.substring(4,6), 16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function darken(hex, amt) {
  hex = hex.replace('#', '');
  let r = parseInt(hex.substring(0,2), 16);
  let g = parseInt(hex.substring(2,4), 16);
  let b = parseInt(hex.substring(4,6), 16);
  r = Math.max(0, r - amt); g = Math.max(0, g - amt); b = Math.max(0, b - amt);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

function isLightColor(hex) {
  hex = hex.replace('#', '');
  const r = parseInt(hex.substring(0,2), 16);
  const g = parseInt(hex.substring(2,4), 16);
  const b = parseInt(hex.substring(4,6), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}
